<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Request rejected — Aprendí</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    * { margin: 0; }
    html { font-size: 16px; }
    body {
      min-height: 100dvh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #ffffff;
      color: #111827;
      display: flex;
      flex-direction: column;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #111827; color: #f9fafb; }
      .muted { color: #9ca3af !important; }
      .wordmark { color: #818cf8 !important; }
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem;
      max-width: 80rem;
      margin: 0 auto;
      width: 100%;
    }
    .wordmark {
      font-size: 1.5rem;
      font-weight: 700;
      color: #4f46e5;
      text-decoration: none;
    }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem 4rem;
      text-align: center;
    }
    .code {
      font-size: clamp(4rem, 12vw, 6rem);
      font-weight: 700;
      letter-spacing: -0.05em;
      color: #4f46e5;
      line-height: 1;
    }
    h1 {
      margin-top: 1.5rem;
      font-size: clamp(1.5rem, 4vw, 1.875rem);
      font-weight: 700;
      letter-spacing: -0.025em;
    }
    .muted {
      margin-top: 1rem;
      max-width: 28rem;
      font-size: 1rem;
      line-height: 1.625;
      color: #4b5563;
    }
    .btn {
      display: inline-flex;
      margin-top: 2.5rem;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: #4f46e5;
      border-radius: 0.375rem;
      text-decoration: none;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }
    .btn:hover { background: #6366f1; }
  </style>
</head>
<body>
  <header>
    <a href="/" class="wordmark">Aprendí</a>
  </header>
  <main>
    <p class="code" aria-hidden="true">422</p>
    <h1>This change could not be made</h1>
    <p class="muted">The request was blocked or could not be completed. Try again from the home page.</p>
    <a href="/" class="btn">Go home</a>
  </main>
</body>
</html>
